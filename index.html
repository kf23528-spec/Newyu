<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>📈 日本株式投資シミュレーター 2020-2025</title>
<style>
:root {
  --bg: #0a0e1a;
  --bg2: #111827;
  --bg3: #1f2937;
  --card: #1e2535;
  --border: #2d3748;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --text3: #64748b;
  --green: #10b981;
  --green2: #065f46;
  --red: #ef4444;
  --red2: #7f1d1d;
  --blue: #3b82f6;
  --blue2: #1e3a5f;
  --yellow: #f59e0b;
  --purple: #8b5cf6;
  --accent: #06b6d4;
  --nav-h: 60px;
  --header-h: 56px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif; font-size:14px; }

/* ===== SCREENS ===== */
.screen { position:fixed; inset:0; background:var(--bg); display:none; flex-direction:column; }
.screen.active { display:flex; }

/* ===== SPLASH ===== */
#splash { justify-content:center; align-items:center; background:linear-gradient(135deg,#0a0e1a 0%,#0d1b2a 50%,#0a0e1a 100%); }
.splash-logo { font-size:72px; margin-bottom:16px; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
.splash-title { font-size:22px; font-weight:900; color:var(--accent); letter-spacing:2px; text-align:center; margin-bottom:8px; }
.splash-sub { font-size:13px; color:var(--text2); text-align:center; margin-bottom:40px; }
.splash-btn { background:linear-gradient(135deg,var(--blue),var(--accent)); color:#fff; border:none; padding:16px 48px; border-radius:50px; font-size:18px; font-weight:700; cursor:pointer; box-shadow:0 4px 20px rgba(59,130,246,0.4); letter-spacing:1px; }
.splash-info { margin-top:24px; text-align:center; color:var(--text3); font-size:12px; line-height:1.8; }

/* ===== HEADER ===== */
.header { height:var(--header-h); background:var(--bg2); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 16px; gap:12px; flex-shrink:0; position:relative; }
.header-back { background:none; border:none; color:var(--accent); font-size:20px; cursor:pointer; padding:4px; }
.header-title { font-size:16px; font-weight:700; flex:1; }
.header-date { font-size:11px; color:var(--text2); text-align:right; }

/* ===== NAV ===== */
.nav { height:var(--nav-h); background:var(--bg2); border-top:1px solid var(--border); display:flex; flex-shrink:0; }
.nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; border:none; background:none; color:var(--text3); font-size:10px; cursor:pointer; transition:color 0.2s; }
.nav-btn.active { color:var(--accent); }
.nav-icon { font-size:22px; }

/* ===== CONTENT ===== */
.content { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; }

/* ===== TICKER ===== */
.ticker-wrap { background:var(--bg3); border-bottom:1px solid var(--border); overflow:hidden; height:28px; flex-shrink:0; }
.ticker-inner { display:flex; align-items:center; height:100%; white-space:nowrap; animation:ticker 80s linear infinite; }
.ticker-item { display:inline-flex; align-items:center; gap:6px; padding:0 16px; font-size:11px; }
.ticker-item .t-code { color:var(--text3); }
.ticker-item .t-price { color:var(--text); font-weight:600; }
.ticker-item .t-chg.up { color:var(--green); }
.ticker-item .t-chg.dn { color:var(--red); }
.ticker-sep { color:var(--border); }
@keyframes ticker { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }

/* ===== MARKET SCREEN ===== */
.market-header { padding:12px 16px; background:var(--card); border-bottom:1px solid var(--border); }
.market-nikkei { display:flex; align-items:baseline; gap:8px; }
.nikkei-label { font-size:11px; color:var(--text2); }
.nikkei-val { font-size:28px; font-weight:900; color:var(--text); }
.nikkei-chg { font-size:13px; font-weight:700; }
.nikkei-chg.up { color:var(--green); }
.nikkei-chg.dn { color:var(--red); }
.game-date-bar { display:flex; justify-content:space-between; align-items:center; margin-top:6px; }
.game-date { font-size:13px; color:var(--accent); font-weight:700; }
.game-cash { font-size:13px; color:var(--yellow); font-weight:700; }

/* SEARCH */
.search-bar { padding:8px 16px; background:var(--bg2); border-bottom:1px solid var(--border); }
.search-input { width:100%; background:var(--bg3); border:1px solid var(--border); border-radius:8px; padding:8px 12px; color:var(--text); font-size:14px; outline:none; }
.search-input::placeholder { color:var(--text3); }

/* SECTOR FILTER */
.sector-filter { display:flex; gap:8px; padding:8px 16px; overflow-x:auto; background:var(--bg2); border-bottom:1px solid var(--border); }
.sector-filter::-webkit-scrollbar { display:none; }
.sector-btn { flex-shrink:0; padding:4px 12px; border-radius:20px; border:1px solid var(--border); background:var(--bg3); color:var(--text2); font-size:11px; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
.sector-btn.active { background:var(--blue); border-color:var(--blue); color:#fff; }

/* STOCK LIST */
.stock-list { padding:4px 0; }
.stock-item { display:flex; align-items:center; padding:12px 16px; border-bottom:1px solid var(--border); cursor:pointer; transition:background 0.15s; gap:12px; }
.stock-item:active { background:var(--bg3); }
.stock-item:hover { background:var(--bg3); }
.stock-left { flex:1; min-width:0; }
.stock-name { font-size:13px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.stock-code { font-size:11px; color:var(--text3); margin-top:2px; }
.stock-sector-tag { display:inline-block; font-size:9px; background:var(--bg3); border:1px solid var(--border); color:var(--text3); padding:1px 5px; border-radius:3px; margin-left:4px; }
.stock-mini-chart { width:60px; height:30px; flex-shrink:0; }
.stock-right { text-align:right; flex-shrink:0; min-width:80px; }
.stock-price { font-size:15px; font-weight:800; }
.stock-chg { font-size:11px; font-weight:700; margin-top:2px; }
.up { color:var(--green); }
.dn { color:var(--red); }
.flat { color:var(--text3); }

/* owned badge */
.owned-badge { display:inline-block; font-size:9px; background:var(--blue2); color:var(--blue); border:1px solid var(--blue); padding:1px 5px; border-radius:3px; margin-left:4px; }

/* ===== STOCK DETAIL ===== */
#detail { z-index:10; }
.detail-price-area { padding:16px; background:var(--card); border-bottom:1px solid var(--border); }
.detail-name { font-size:18px; font-weight:900; }
.detail-code { font-size:12px; color:var(--text2); margin-top:2px; margin-bottom:12px; }
.detail-price-big { font-size:36px; font-weight:900; }
.detail-changes { display:flex; gap:16px; margin-top:4px; }
.detail-chg-item { font-size:12px; }

/* Chart area */
.chart-area { padding:8px 0; background:var(--bg); }
.chart-range-btns { display:flex; gap:0; padding:0 16px 8px; }
.range-btn { flex:1; padding:5px; border:1px solid var(--border); background:var(--bg3); color:var(--text2); font-size:11px; cursor:pointer; }
.range-btn:first-child { border-radius:6px 0 0 6px; }
.range-btn:last-child { border-radius:0 6px 6px 0; }
.range-btn.active { background:var(--blue); color:#fff; border-color:var(--blue); }
.main-chart { display:block; width:100%; }

/* Stats grid */
.stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:1px; background:var(--border); margin:0 0 8px; }
.stat-cell { background:var(--card); padding:12px 16px; }
.stat-label { font-size:10px; color:var(--text3); margin-bottom:4px; }
.stat-val { font-size:14px; font-weight:700; }

/* Trade panel */
.trade-panel { padding:16px; background:var(--card); border-top:1px solid var(--border); flex-shrink:0; }
.trade-tabs { display:flex; margin-bottom:12px; border-radius:8px; overflow:hidden; border:1px solid var(--border); }
.trade-tab { flex:1; padding:8px; text-align:center; font-size:13px; font-weight:700; cursor:pointer; background:var(--bg3); color:var(--text2); transition:all 0.2s; }
.trade-tab.buy.active { background:var(--green); color:#fff; }
.trade-tab.sell.active { background:var(--red); color:#fff; }
.trade-row { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
.trade-label { font-size:12px; color:var(--text2); width:48px; flex-shrink:0; }
.trade-input { flex:1; background:var(--bg3); border:1px solid var(--border); border-radius:6px; padding:8px 10px; color:var(--text); font-size:14px; text-align:right; outline:none; }
.qty-btn { background:var(--bg3); border:1px solid var(--border); border-radius:6px; width:34px; height:34px; color:var(--text); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.trade-total { text-align:right; font-size:12px; color:var(--text2); margin-bottom:10px; }
.trade-total span { color:var(--yellow); font-weight:700; font-size:14px; }
.trade-exec-btn { width:100%; padding:14px; border-radius:10px; border:none; font-size:16px; font-weight:800; cursor:pointer; letter-spacing:1px; transition:opacity 0.2s; }
.trade-exec-btn.buy { background:linear-gradient(135deg,#10b981,#059669); color:#fff; }
.trade-exec-btn.sell { background:linear-gradient(135deg,#ef4444,#dc2626); color:#fff; }
.trade-exec-btn:disabled { opacity:0.4; cursor:not-allowed; }

/* ===== PORTFOLIO ===== */
.pf-summary { padding:16px; background:linear-gradient(135deg,var(--card),var(--bg3)); border-bottom:1px solid var(--border); }
.pf-total { font-size:28px; font-weight:900; }
.pf-pnl { font-size:15px; font-weight:700; margin-top:4px; }
.pf-breakdown { display:flex; gap:16px; margin-top:12px; }
.pf-bd-item { flex:1; background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:8px; padding:10px; }
.pf-bd-label { font-size:10px; color:var(--text3); }
.pf-bd-val { font-size:14px; font-weight:700; margin-top:4px; }
.pf-holdings { padding:4px 0; }
.holding-item { display:flex; align-items:center; padding:12px 16px; border-bottom:1px solid var(--border); cursor:pointer; gap:12px; }
.holding-item:active { background:var(--bg3); }
.holding-left { flex:1; min-width:0; }
.holding-name { font-size:13px; font-weight:700; }
.holding-qty { font-size:11px; color:var(--text2); }
.holding-right { text-align:right; }
.holding-val { font-size:15px; font-weight:800; }
.holding-pnl { font-size:11px; font-weight:700; margin-top:2px; }
.empty-state { text-align:center; padding:60px 20px; color:var(--text3); }
.empty-icon { font-size:48px; margin-bottom:12px; }

/* CHART mini */
.pf-chart-wrap { padding:16px; }
.pf-chart-title { font-size:12px; color:var(--text2); margin-bottom:8px; }

/* ===== NEWS ===== */
.news-list { padding:4px 0; }
.news-item { padding:14px 16px; border-bottom:1px solid var(--border); }
.news-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:6px; }
.news-date { font-size:10px; color:var(--text3); }
.news-tag { font-size:9px; padding:2px 8px; border-radius:10px; font-weight:700; }
.news-tag.crash { background:var(--red2); color:var(--red); }
.news-tag.rally { background:var(--green2); color:var(--green); }
.news-tag.event { background:var(--blue2); color:var(--blue); }
.news-tag.policy { background:#4a1d96; color:var(--purple); }
.news-tag.intl { background:#1c1917; color:var(--yellow); }
.news-headline { font-size:14px; font-weight:700; margin-bottom:4px; line-height:1.5; }
.news-body { font-size:12px; color:var(--text2); line-height:1.6; }
.news-impact { display:flex; align-items:center; gap:4px; margin-top:6px; font-size:11px; }
.news-future { opacity:0.3; }
.news-future .news-headline::before { content:"🔒 "; }

/* ===== HISTORY ===== */
.tx-list { padding:4px 0; }
.tx-item { padding:12px 16px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
.tx-left { }
.tx-name { font-size:13px; font-weight:700; }
.tx-detail { font-size:11px; color:var(--text2); margin-top:2px; }
.tx-date { font-size:10px; color:var(--text3); margin-top:2px; }
.tx-right { text-align:right; }
.tx-amount { font-size:14px; font-weight:800; }
.tx-type { font-size:10px; font-weight:700; padding:2px 8px; border-radius:10px; margin-top:2px; display:inline-block; }
.tx-type.buy { background:var(--green2); color:var(--green); }
.tx-type.sell { background:var(--red2); color:var(--red); }

/* ===== TOAST ===== */
.toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--card); color:var(--text); padding:12px 24px; border-radius:24px; font-size:14px; font-weight:700; z-index:9999; pointer-events:none; opacity:0; transition:all 0.3s; border:1px solid var(--border); max-width:280px; text-align:center; box-shadow:0 4px 20px rgba(0,0,0,0.5); }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.toast.success { border-color:var(--green); color:var(--green); }
.toast.error { border-color:var(--red); color:var(--red); }

/* ===== MODAL ===== */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:100; display:none; align-items:flex-end; }
.modal-overlay.open { display:flex; }
.modal-box { background:var(--bg2); border-radius:20px 20px 0 0; padding:24px; width:100%; border:1px solid var(--border); }
.modal-title { font-size:16px; font-weight:900; margin-bottom:16px; }
.modal-btns { display:flex; gap:12px; margin-top:16px; }
.modal-btn { flex:1; padding:12px; border-radius:10px; border:none; font-size:15px; font-weight:700; cursor:pointer; }
.modal-btn.cancel { background:var(--bg3); color:var(--text); }
.modal-btn.confirm { background:var(--blue); color:#fff; }

/* ===== SCROLLBAR ===== */
.content::-webkit-scrollbar { width:3px; }
.content::-webkit-scrollbar-track { background:transparent; }
.content::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

/* ===== LOADING ===== */
.loading { display:flex; justify-content:center; align-items:center; height:200px; }
.spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }

/* ===== RESPONSIVE CANVAS ===== */
canvas { max-width:100%; }

/* News badge */
.news-count-badge { background:var(--red); color:#fff; border-radius:10px; font-size:9px; font-weight:700; padding:2px 5px; position:absolute; top:4px; right:8px; }

/* Price flash */
@keyframes flashGreen { 0%{background:rgba(16,185,129,0.3)} 100%{background:transparent} }
@keyframes flashRed { 0%{background:rgba(239,68,68,0.3)} 100%{background:transparent} }
.flash-green { animation:flashGreen 1s ease-out; }
.flash-red { animation:flashRed 1s ease-out; }
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash" class="screen active">
  <div class="splash-logo">📈</div>
  <div class="splash-title">日本株式投資シミュレーター</div>
  <div class="splash-sub">2020〜2025 リアル株価体験</div>
  <button class="splash-btn" onclick="startGame()">ゲームを始める</button>
  <div class="splash-info">
    初期資金：1,000,000円<br>
    50銘柄 × 実際の株価データ<br>
    ゲーム内時間＝リアルタイム進行<br>
    <small style="color:var(--text3)">※株価は実際の推移を参考にした近似値です</small>
  </div>
</div>

<!-- MAIN SCREEN -->
<div id="main" class="screen">
  <!-- TICKER -->
  <div class="ticker-wrap">
    <div class="ticker-inner" id="tickerInner"></div>
  </div>

  <!-- TAB CONTENT AREAS -->
  <div id="tabMarket" class="tab-content" style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
    <div class="market-header">
      <div class="market-nikkei">
        <span class="nikkei-label">日経平均</span>
        <span class="nikkei-val" id="nikkeiVal">--,---</span>
        <span class="nikkei-chg" id="nikkeiChg">--</span>
      </div>
      <div class="game-date-bar">
        <span class="game-date" id="gameDateDisplay">----年--月--日</span>
        <span class="game-cash" id="cashDisplay">¥1,000,000</span>
      </div>
    </div>
    <div class="search-bar">
      <input type="text" class="search-input" id="searchInput" placeholder="🔍 銘柄名・コードで検索..." oninput="filterStocks()">
    </div>
    <div class="sector-filter" id="sectorFilter"></div>
    <div class="content" id="stockList"></div>
  </div>

  <div id="tabPortfolio" class="tab-content" style="flex:1;display:flex;flex-direction:column;overflow:hidden;display:none;">
    <div id="pfSummary"></div>
    <div class="content" id="pfContent"></div>
  </div>

  <div id="tabNews" class="tab-content" style="flex:1;display:flex;flex-direction:column;overflow:hidden;display:none;">
    <div class="header" style="position:relative;">
      <div class="header-title">📰 マーケットニュース</div>
      <div class="header-date" id="newsDateDisplay"></div>
    </div>
    <div class="content" id="newsList"></div>
  </div>

  <div id="tabHistory" class="tab-content" style="flex:1;display:flex;flex-direction:column;overflow:hidden;display:none;">
    <div class="header">
      <div class="header-title">🗒️ 取引履歴</div>
    </div>
    <div class="content" id="historyList"></div>
  </div>

  <!-- NAV -->
  <div class="nav">
    <button class="nav-btn active" onclick="switchTab('market',this)">
      <span class="nav-icon">📊</span>市場
    </button>
    <button class="nav-btn" onclick="switchTab('portfolio',this)" style="position:relative;">
      <span class="nav-icon">💼</span>資産
    </button>
    <button class="nav-btn" onclick="switchTab('news',this)" style="position:relative;">
      <span class="nav-icon">📰</span>ニュース
      <span class="news-count-badge" id="newsBadge" style="display:none">0</span>
    </button>
    <button class="nav-btn" onclick="switchTab('history',this)">
      <span class="nav-icon">📋</span>履歴
    </button>
  </div>
</div>

<!-- DETAIL SCREEN -->
<div id="detail" class="screen" style="z-index:10;">
  <div class="header">
    <button class="header-back" onclick="closeDetail()">←</button>
    <div class="header-title" id="detailTitle">銘柄詳細</div>
    <div class="header-date" id="detailHeaderDate"></div>
  </div>
  <div class="content" id="detailContent"></div>
  <div class="trade-panel" id="tradePanel"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>

// =============================================
// TIME FUNCTIONS
// =============================================
function getGameDate() {
  const elapsed = Date.now() - gameState.startEpoch;
  const gameMs = GAME_START_DATE.getTime() + elapsed;
  const gd = new Date(gameMs);
  if (gd > GAME_END_DATE) return GAME_END_DATE;
  return gd;
}

function formatDate(d) {
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
}

function formatDateShort(d) {
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}

// =============================================
// PRICE CALCULATION
// =============================================
function getMonthIndex(date) {
  const y = date.getFullYear();
  const m = date.getMonth(); // 0-11
  return (y - 2020) * 12 + m;
}

function getStockPrice(stock, date) {
  const idx = getMonthIndex(date);
  const clampedIdx = Math.max(0, Math.min(71, idx));
  
  // Linear interpolation within month
  const monthStart = new Date(date.getFullYear(), date.getMonth(), 1);
  const monthEnd = new Date(date.getFullYear(), date.getMonth() + 1, 0);
  const dayInMonth = date.getDate() - 1;
  const daysInMonth = monthEnd.getDate();
  const t = dayInMonth / daysInMonth;
  
  const p0 = stock.prices[clampedIdx] || stock.prices[stock.prices.length-1];
  const p1 = stock.prices[Math.min(71, clampedIdx + 1)] || p0;
  
  // Add small daily noise
  const seed = date.getFullYear() * 10000 + (date.getMonth()+1) * 100 + date.getDate() + stock.code.charCodeAt(0);
  const noise = (Math.sin(seed * 9301 + 49297) * 0.5 + 0.5) * 0.02 - 0.01; // ±1%
  
  const price = p0 + (p1 - p0) * t;
  return Math.round(price * (1 + noise));
}

function getPriceChange(stock, date, days) {
  const prevDate = new Date(date.getTime() - days * 86400000);
  const curr = getStockPrice(stock, date);
  const prev = getStockPrice(stock, prevDate);
  return { curr, prev, change: curr - prev, pct: ((curr - prev) / prev * 100) };
}

function getNikkeiIndex(date) {
  // Approximate Nikkei 225 value based on weighted average
  const nikkeiMonthly = [
    23500,21000,18000,19500,20500,22000,22500,23000,23500,23000,26000,27400,
    28000,28500,29500,29000,28000,29000,27500,28000,30000,28500,29500,28800,
    27500,27000,28000,27000,27500,26000,27500,28000,26500,27500,28000,26000,
    27000,27500,28000,29000,30800,33000,32500,32000,31000,31000,33500,33500,
    35500,38000,40000,38000,38500,39000,41000,35000,37000,39000,38500,39000,
    40000,38000,36000,35500,35000,34500,34000,33500,33000,32500,32000,31500
  ];
  const idx = getMonthIndex(date);
  const ci = Math.max(0, Math.min(71, idx));
  const p0 = nikkeiMonthly[ci];
  const p1 = nikkeiMonthly[Math.min(71, ci+1)] || p0;
  const monthStart = new Date(date.getFullYear(), date.getMonth(), 1);
  const monthEnd = new Date(date.getFullYear(), date.getMonth() + 1, 0);
  const t = (date.getDate()-1) / monthEnd.getDate();
  return Math.round(p0 + (p1-p0)*t);
}

// =============================================
// SAVE/LOAD
// =============================================
function saveState() {
  localStorage.setItem(LS_KEY, JSON.stringify(gameState));
}

function loadState() {
  const saved = localStorage.getItem(LS_KEY);
  if (saved) {
    try {
      const parsed = JSON.parse(saved);
      gameState = { ...gameState, ...parsed };
      return true;
    } catch(e) {}
  }
  return false;
}

// =============================================
// GAME START
// =============================================
function startGame() {
  const hasState = loadState();
  if (!hasState || !gameState.startEpoch) {
    gameState.startEpoch = Date.now();
    gameState.cash = INITIAL_CASH;
    gameState.portfolio = {};
    gameState.transactions = [];
    gameState.seenNews = [];
    saveState();
  }
  
  document.getElementById('splash').classList.remove('active');
  document.getElementById('main').classList.add('active');
  
  initTicker();
  renderMarket();
  startUpdateLoop();
}

// =============================================
// TICKER
// =============================================
function initTicker() {
  const gd = getGameDate();
  let html = '';
  for (let i = 0; i < STOCKS.length; i++) {
    const s = STOCKS[i];
    const { curr, pct } = getPriceChange(s, gd, 1);
    const cls = pct >= 0 ? 'up' : 'dn';
    html += `<span class="ticker-item"><span class="t-code">${s.code}</span><span class="t-price">${curr.toLocaleString()}</span><span class="t-chg ${cls}">${pct >= 0 ? '+' : ''}${pct.toFixed(2)}%</span></span><span class="ticker-sep">|</span>`;
  }
  html += html; // duplicate for seamless loop
  document.getElementById('tickerInner').innerHTML = html;
}

// =============================================
// UPDATE LOOP
// =============================================
let updateInterval;
function startUpdateLoop() {
  updateDisplay();
  updateInterval = setInterval(() => {
    updateDisplay();
  }, 10000); // update every 10 seconds
}

function updateDisplay() {
  const gd = getGameDate();
  const nikkei = getNikkeiIndex(gd);
  const nikkeiYest = getNikkeiIndex(new Date(gd.getTime() - 86400000));
  const nChg = nikkei - nikkeiYest;
  const nPct = (nChg / nikkeiYest * 100).toFixed(2);
  
  const nikkeiEl = document.getElementById('nikkeiVal');
  const nikkeiChgEl = document.getElementById('nikkeiChg');
  if (nikkeiEl) {
    nikkeiEl.textContent = nikkei.toLocaleString();
    nikkeiChgEl.textContent = `${nChg >= 0 ? '+' : ''}${nChg.toLocaleString()} (${nPct}%)`;
    nikkeiChgEl.className = 'nikkei-chg ' + (nChg >= 0 ? 'up' : 'dn');
  }
  
  const dateEl = document.getElementById('gameDateDisplay');
  if (dateEl) dateEl.textContent = formatDate(gd);
  
  const cashEl = document.getElementById('cashDisplay');
  if (cashEl) cashEl.textContent = '¥' + Math.round(gameState.cash).toLocaleString();
  
  const newsDateEl = document.getElementById('newsDateDisplay');
  if (newsDateEl) newsDateEl.textContent = formatDate(gd);
  
  const detailHeaderDate = document.getElementById('detailHeaderDate');
  if (detailHeaderDate) detailHeaderDate.textContent = formatDate(gd);
  
  // Check for new news
  const availableNews = NEWS_EVENTS.filter(n => new Date(n.date) <= gd);
  const newCount = availableNews.length - (gameState.lastNewsCount || 0);
  if (newCount > 0 && (gameState.lastNewsCount || 0) > 0) {
    const badge = document.getElementById('newsBadge');
    if (badge) {
      badge.style.display = 'block';
      badge.textContent = newCount;
    }
  }
  gameState.lastNewsCount = availableNews.length;
  
  // Refresh current view
  if (currentTab === 'market') renderStockList();
  if (currentTab === 'portfolio') renderPortfolio();
  if (currentTab === 'news') renderNews();
  
  // Update detail if open
  if (document.getElementById('detail').classList.contains('active')) {
    updateDetailPrice();
  }
  
  saveState();
}

// TAB SWITCHING
// =============================================
function switchTab(tab, btn) {
  currentTab = tab;
  
  // Hide all content
  document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  
  btn.classList.add('active');
  
  if (tab === 'market') {
    document.getElementById('tabMarket').style.display = 'flex';
    renderMarket();
  } else if (tab === 'portfolio') {
    document.getElementById('tabPortfolio').style.display = 'flex';
    renderPortfolio();
  } else if (tab === 'news') {
    document.getElementById('tabNews').style.display = 'flex';
    document.getElementById('newsBadge').style.display = 'none';
    renderNews();
  } else if (tab === 'history') {
    document.getElementById('tabHistory').style.display = 'flex';
    renderHistory();
  }
}

        <div class="stock-chg ${cls}">${change>=0?'+':''}${change.toLocaleString()} (${pct.toFixed(2)}%)</div>
      </div>
    </div>`;
  }).join('');
  
  document.getElementById('stockList').innerHTML = html || '<div class="empty-state"><div class="empty-icon">🔍</div><div>銘柄が見つかりません</div></div>';
  
  // Draw mini charts
  requestAnimationFrame(() => {
    filtered.forEach(s => {
      const canvas = document.getElementById('mini_' + s.code);
      if (canvas) drawMiniChart(canvas, s, gd);
    });
  });
}

function getMiniChartData(stock, date) {
  const points = [];
  for (let i = 14; i >= 0; i--) {
    const d = new Date(date.getTime() - i * 86400000);
    if (d >= GAME_START_DATE) {
      points.push(getStockPrice(stock, d));
    }
  }
  return points;
}

function drawMiniChart(canvas, stock, date) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width;
  const h = canvas.height;
  const data = getMiniChartData(stock, date);
  if (data.length < 2) return;
  
  ctx.clearRect(0,0,w,h);
  const min = Math.min(...data);
  const max = Math.max(...data);
  const range = max - min || 1;
  
  const isUp = data[data.length-1] >= data[0];
  const color = isUp ? '#10b981' : '#ef4444';
  
  ctx.beginPath();
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  
  data.forEach((v, i) => {
    const x = (i / (data.length - 1)) * w;
    const y = h - ((v - min) / range) * (h - 2) - 1;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();
  
  // Fill
  ctx.lineTo(w, h);
  ctx.lineTo(0, h);
  ctx.closePath();
  ctx.fillStyle = isUp ? 'rgba(16,185,129,0.1)' : 'rgba(239,68,68,0.1)';
  ctx.fill();
}

function drawMainChart(canvas, stock, date) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width;
  const h = canvas.height;
  ctx.clearRect(0,0,w,h);
  
  const rangeDays = {
    '1w': 7, '1m': 30, '3m': 90, '6m': 180, '1y': 365, 'all': 1827
  }[currentRange] || 365;
  
  const points = [];
  const step = Math.max(1, Math.floor(rangeDays / 200));
  
  for (let i = rangeDays; i >= 0; i -= step) {
    const d = new Date(date.getTime() - i * 86400000);
    if (d >= GAME_START_DATE && d <= date) {
      points.push({ d, v: getStockPrice(stock, d) });
    }
  }
  
  if (points.length < 2) return;
  
  const values = points.map(p => p.v);
  const minV = Math.min(...values);
  const maxV = Math.max(...values);
  const rangeV = maxV - minV || 1;
  
  const pad = { t: 20, r: 16, b: 30, l: 60 };
  const cw = w - pad.l - pad.r;
  const ch = h - pad.t - pad.b;
  
  const isUp = points[points.length-1].v >= points[0].v;
  const lineColor = isUp ? '#10b981' : '#ef4444';
  const fillColor = isUp ? 'rgba(16,185,129,0.15)' : 'rgba(239,68,68,0.15)';
  
  // Grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.t + (ch / 4) * i;
    ctx.beginPath();
    ctx.moveTo(pad.l, y);
    ctx.lineTo(pad.l + cw, y);
    ctx.stroke();
    
    const val = maxV - (rangeV / 4) * i;
    ctx.fillStyle = '#64748b';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(val >= 10000 ? (val/10000).toFixed(1)+'万' : val.toLocaleString(), pad.l - 4, y + 4);
  }
  
  // Price line path
  ctx.beginPath();
  points.forEach((p, i) => {
    const x = pad.l + (i / (points.length - 1)) * cw;
    const y = pad.t + ((maxV - p.v) / rangeV) * ch;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  
  // Fill
  const lastX = pad.l + cw;
  const lastY = pad.t + ch;
  ctx.lineTo(lastX, lastY);
  ctx.lineTo(pad.l, lastY);
  ctx.closePath();
  ctx.fillStyle = fillColor;
  ctx.fill();
  
  // Line
  ctx.beginPath();
  points.forEach((p, i) => {
    const x = pad.l + (i / (points.length - 1)) * cw;
    const y = pad.t + ((maxV - p.v) / rangeV) * ch;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.strokeStyle = lineColor;
  ctx.lineWidth = 2;
  ctx.stroke();
  
  // Date labels
  ctx.fillStyle = '#64748b';
  ctx.font = '10px sans-serif';
  ctx.textAlign = 'center';
  const labelCount = 4;
  for (let i = 0; i <= labelCount; i++) {
    const idx = Math.floor((points.length - 1) * i / labelCount);
    if (idx < points.length) {
      const x = pad.l + (idx / (points.length - 1)) * cw;
      const d = points[idx].d;
      const label = `${d.getFullYear()}/${d.getMonth()+1}`;
      ctx.fillText(label, x, h - 4);
    }
  }
  
  // Current price dot
  const lastPt = points[points.length - 1];
  const lx = pad.l + cw;
  const ly = pad.t + ((maxV - lastPt.v) / rangeV) * ch;
  ctx.beginPath();
  ctx.arc(lx, ly, 4, 0, Math.PI * 2);
  ctx.fillStyle = lineColor;
  ctx.fill();
}

    </div>
    <button class="trade-exec-btn ${currentTradeMode}" onclick="executeTrade('${stock.code}',${price})">${currentTradeMode==='buy'?'買い注文を実行':'売り注文を実行'}</button>
  `;

function setTradeMode(mode) {
  currentTradeMode = mode;
  const stock = STOCKS.find(s => s.code === currentStockCode);
  if (!stock) return;
  const gd = getGameDate();
  const curr = getStockPrice(stock, gd);
  const owned = gameState.portfolio[stock.code];
  const ownedQty = owned ? owned.qty : 0;
  renderTradePanel(stock, curr, ownedQty);
}

function adjustQty(delta) {
  const input = document.getElementById('tradeQty');
  if (!input) return;
  const val = parseInt(input.value) || 0;
  const stock = STOCKS.find(s => s.code === currentStockCode);
  const gd = getGameDate();
  const price = getStockPrice(stock, gd);
  input.value = Math.max(1, val + delta);
  updateTradeTotal(price);
}

function updateTradeTotal(price) {
  const input = document.getElementById('tradeQty');
  const totalEl = document.getElementById('tradeTotal');
  if (!input || !totalEl) return;
  const qty = parseInt(input.value) || 0;
  totalEl.textContent = (price * qty).toLocaleString() + '円';
}

function executeTrade(code, price) {
  const input = document.getElementById('tradeQty');
  const qty = parseInt(input.value) || 0;
  if (qty <= 0) { showToast('株数を入力してください', 'error'); return; }
  
  const stock = STOCKS.find(s => s.code === code);
  const totalCost = price * qty;
  const gd = getGameDate();
  
  if (currentTradeMode === 'buy') {
    if (totalCost > gameState.cash) {
      showToast('資金が不足しています', 'error'); return;
    }
    gameState.cash -= totalCost;
    if (!gameState.portfolio[code]) {
      gameState.portfolio[code] = { qty: 0, avgPrice: 0 };
    }
    const p = gameState.portfolio[code];
    const totalVal = p.qty * p.avgPrice + totalCost;
    p.qty += qty;
    p.avgPrice = totalVal / p.qty;
    
    gameState.transactions.push({
      type: 'buy', code, name: stock.name, qty, price, total: totalCost,
      date: formatDateShort(gd)
    });
    showToast(`✅ ${stock.name}を${qty}株購入しました`, 'success');
    
  } else {
    const owned = gameState.portfolio[code];
    if (!owned || owned.qty < qty) {
      showToast('保有株数が不足しています', 'error'); return;
    }
    gameState.cash += totalCost;
    owned.qty -= qty;
    const pnl = (price - owned.avgPrice) * qty;
    const pnlPct = (pnl / (owned.avgPrice * qty) * 100).toFixed(2);
    
    if (owned.qty === 0) delete gameState.portfolio[code];
    
    gameState.transactions.push({
      type: 'sell', code, name: stock.name, qty, price, total: totalCost,
      pnl, date: formatDateShort(gd)
    });
    showToast(`${pnl>=0?'✅':'⚠️'} ${stock.name}を${qty}株売却 (損益: ${pnl>=0?'+':''}${Math.round(pnl).toLocaleString()}円/${pnlPct}%)`, pnl>=0?'success':'error');
  }
  
  saveState();
  renderDetail();
}

// PORTFOLIO
// =============================================
function renderPortfolio() {
  const gd = getGameDate();
  let totalAssetVal = 0;
  let totalCostVal = 0;
  
  const holdings = Object.entries(gameState.portfolio)
    .filter(([_, p]) => p.qty > 0)
    .map(([code, p]) => {
      const stock = STOCKS.find(s => s.code === code);
      if (!stock) return null;
      const price = getStockPrice(stock, gd);
      const val = price * p.qty;
      const cost = p.avgPrice * p.qty;
      totalAssetVal += val;
      totalCostVal += cost;
      return { code, stock, p, price, val, cost, pnl: val - cost, pnlPct: (val-cost)/cost*100 };
    }).filter(Boolean);
  
  const totalAsset = gameState.cash + totalAssetVal;
  const totalPnl = totalAsset - INITIAL_CASH;
  const totalPnlPct = (totalPnl / INITIAL_CASH * 100).toFixed(2);
  
  document.getElementById('pfSummary').innerHTML = `
    <div class="pf-summary">
      <div style="font-size:11px;color:var(--text2);margin-bottom:4px;">総資産</div>
      <div class="pf-total">${Math.round(totalAsset).toLocaleString()}円</div>
      <div class="pf-pnl ${totalPnl>=0?'up':'dn'}">
        ${totalPnl>=0?'▲':'▼'} ${Math.abs(Math.round(totalPnl)).toLocaleString()}円 (${totalPnl>=0?'+':''}${totalPnlPct}%)
      </div>
      <div class="pf-breakdown">
        <div class="pf-bd-item">
          <div class="pf-bd-label">💰 現金</div>
          <div class="pf-bd-val">${Math.round(gameState.cash).toLocaleString()}円</div>
        </div>
        <div class="pf-bd-item">
          <div class="pf-bd-label">📈 株式評価額</div>
          <div class="pf-bd-val">${Math.round(totalAssetVal).toLocaleString()}円</div>
        </div>
        <div class="pf-bd-item">
          <div class="pf-bd-label">📊 株式損益</div>
          <div class="pf-bd-val ${totalAssetVal-totalCostVal>=0?'up':'dn'}">${totalAssetVal-totalCostVal>=0?'+':''}${Math.round(totalAssetVal-totalCostVal).toLocaleString()}円</div>
        </div>
      </div>
    </div>
  `;
  
  if (holdings.length === 0) {
    document.getElementById('pfContent').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">💼</div>
        <div>保有銘柄はありません</div>
        <div style="font-size:12px;color:var(--text3);margin-top:8px;">市場で株を購入してみましょう</div>

    <div class="holding-item" onclick="openDetail('${h.code}')">
      <div class="holding-left">
        <div class="holding-name">${h.stock.name}</div>
        <div class="holding-qty">${h.p.qty.toLocaleString()}株 @ ${Math.round(h.p.avgPrice).toLocaleString()}円</div>
      </div>
      <div class="holding-right">
        <div class="holding-val">${Math.round(h.val).toLocaleString()}円</div>
        <div class="holding-pnl ${h.pnl>=0?'up':'dn'}">${h.pnl>=0?'+':''}${Math.round(h.pnl).toLocaleString()}円 (${h.pnlPct.toFixed(2)}%)</div>
      </div>
    </div>
  `).join('');
  
  document.getElementById('pfContent').innerHTML = `
    <div style="padding:12px 16px;font-size:12px;color:var(--text2);border-bottom:1px solid var(--border);">
      保有銘柄 (${holdings.length}銘柄)

  if (hasState && gameState.startEpoch) {
    // Resume existing game
    document.getElementById('splash').innerHTML += `<div style="margin-top:16px;"><button class="splash-btn" style="background:linear-gradient(135deg,#6b7280,#4b5563);margin-top:8px;" onclick="resetGame()">リセット</button></div>`;
  }
});

function resetGame() {
  if (confirm('ゲームをリセットしますか？全ての進行が失われます。')) {
    localStorage.removeItem(LS_KEY);
    location.reload();
  }
}

// Handle visibility change (tab switch detection)
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && gameState.startEpoch) {
    updateDisplay();
    initTicker();
  }
});
</script>
</body>
</html>
